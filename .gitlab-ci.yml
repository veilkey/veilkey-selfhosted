# Root CI configuration for veilkey-selfhosted monorepo.
# Triggers child pipelines for each sub-project.

stages:
  - triggers

client-cli:
  stage: triggers
  trigger:
    include: client/cli/.gitlab-ci.yml
    strategy: depend
  rules:
    - changes:
        - client/cli/**/*
    - if: $CI_COMMIT_TAG
    - if: $CI_PIPELINE_SOURCE == "web"

installer:
  stage: triggers
  trigger:
    include: installer/.gitlab-ci.yml
    strategy: depend
  rules:
    - changes:
        - installer/**/*
    - if: $CI_PIPELINE_SOURCE == "web"

services-keycenter:
  stage: triggers
  trigger:
    include: services/keycenter/.gitlab-ci.yml
    strategy: depend
  rules:
    - changes:
        - services/keycenter/**/*
    - if: $CI_PIPELINE_SOURCE == "web"

services-localvault:
  stage: triggers
  trigger:
    include: services/localvault/.gitlab-ci.yml
    strategy: depend
  rules:
    - changes:
        - services/localvault/**/*
    - if: $CI_PIPELINE_SOURCE == "web"

services-proxy:
  stage: triggers
  trigger:
    include: services/proxy/.gitlab-ci.yml
    strategy: depend
  rules:
    - changes:
        - services/proxy/**/*
    - if: $CI_PIPELINE_SOURCE == "web"
