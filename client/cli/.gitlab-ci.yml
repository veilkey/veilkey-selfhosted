stages:
  - lint
  - test
  - build
  - release

default:
  before_script:
    - cd client/cli

variables:
  VERSION: "0.3.0"

lint:
  stage: lint
  script:
    - go vet ./...
  rules:
    - if: $CI_COMMIT_BRANCH
    - if: $CI_COMMIT_TAG
    - if: $CI_PIPELINE_SOURCE == "parent_pipeline"
  tags:
    - vhost-shell-runner-shared

test:
  stage: test
  script:
    - go test -v -race -coverprofile=coverage.out ./...
  artifacts:
    paths:
      - client/cli/coverage.out
    expire_in: 1 week
  rules:
    - if: $CI_COMMIT_BRANCH
    - if: $CI_COMMIT_TAG
    - if: $CI_PIPELINE_SOURCE == "parent_pipeline"
  tags:
    - vhost-shell-runner-shared

build:
  stage: build
  script:
    - make build-all
  artifacts:
    paths:
      - client/cli/bin/
    expire_in: 1 week
  rules:
    - if: $CI_COMMIT_BRANCH
    - if: $CI_COMMIT_TAG
    - if: $CI_PIPELINE_SOURCE == "parent_pipeline"
  tags:
    - vhost-shell-runner-shared

release:
  stage: release
  script:
    - make package
    - |
      for f in dist/*; do
        filename=$(basename "$f")
        curl --fail --header "JOB-TOKEN: ${CI_JOB_TOKEN}" \
          --upload-file "$f" \
          "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/veilkey-cli/${CI_COMMIT_TAG}/${filename}"
      done
  artifacts:
    paths:
      - client/cli/dist/
    expire_in: 30 days
  rules:
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+$/
  tags:
    - vhost-shell-runner-shared
