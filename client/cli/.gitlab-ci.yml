stages:
  - lint
  - test
  - security
  - build
  - release

variables:
  VERSION: "0.3.0"

lint:
  stage: lint
  script:
    - golangci-lint run ./...
  rules:
    - if: $CI_COMMIT_BRANCH
    - if: $CI_COMMIT_TAG
  tags:
    - vhost-shell-runner-shared

test:
  stage: test
  script:
    - go test -v -race -coverprofile=coverage.out ./...
    - |
      COVERAGE=$(go tool cover -func=coverage.out | grep '^total:' | awk '{print $3}' | sed 's/%//')
      if [ -z "$COVERAGE" ]; then echo "ERROR: could not parse coverage from coverage.out"; exit 1; fi
      echo "Coverage: ${COVERAGE}%"
      if echo "$COVERAGE < 40" | bc -l | grep -q '^1'; then echo "Coverage ${COVERAGE}% is below 40% threshold"; exit 1; fi
  coverage: '/total:\s+\(statements\)\s+(\d+\.\d+)%/'
  artifacts:
    paths:
      - coverage.out
    expire_in: 1 week
  rules:
    - if: $CI_COMMIT_BRANCH
    - if: $CI_COMMIT_TAG
  tags:
    - vhost-shell-runner-shared

gosec:
  stage: security
  script:
    - gosec ./...
  allow_failure: true
  rules:
    - if: $CI_COMMIT_BRANCH
    - if: $CI_COMMIT_TAG
  tags:
    - vhost-shell-runner-shared

govulncheck:
  stage: security
  script:
    - govulncheck ./...
  allow_failure: true
  rules:
    - if: $CI_COMMIT_BRANCH
    - if: $CI_COMMIT_TAG
  tags:
    - vhost-shell-runner-shared

build:
  stage: build
  script:
    - make build-all
  artifacts:
    paths:
      - bin/
    expire_in: 1 week
  rules:
    - if: $CI_COMMIT_BRANCH
    - if: $CI_COMMIT_TAG
  tags:
    - vhost-shell-runner-shared

release:
  stage: release
  script:
    - make package
    - |
      for f in dist/*; do
        filename=$(basename "$f")
        curl --fail --header "JOB-TOKEN: ${CI_JOB_TOKEN}" \
          --upload-file "$f" \
          "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/veilkey-cli/${CI_COMMIT_TAG}/${filename}"
      done
  artifacts:
    paths:
      - dist/
    expire_in: 30 days
  rules:
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+$/
  tags:
    - vhost-shell-runner-shared
