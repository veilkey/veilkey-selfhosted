stages:
  - test
  - build

default:
  before_script:
    - cd services/proxy

go:test:
  stage: test
  script:
    - go test ./...
    - bash tests/run-shell-tests.sh
  rules:
    - if: $CI_COMMIT_BRANCH
    - if: $CI_PIPELINE_SOURCE == "parent_pipeline"
  tags:
    - vhost-shell-runner-shared

# Minimal build gate for the observer/proxy scaffold.
go:build:
  stage: build
  script:
    - go build ./cmd/veilkey-proxy
  rules:
    - if: $CI_COMMIT_BRANCH
    - if: $CI_PIPELINE_SOURCE == "parent_pipeline"
  tags:
    - vhost-shell-runner-shared
